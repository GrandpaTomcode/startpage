<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="stylesheet" href="/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>startpage</title>

  <body>
    <div>
      <div id="titleSearch">
        <h1 id="greeting" class="title">Good Morning, Tom</h1>

        <form
          class="search"
          action="https://www.google.com/search"
          method="get"
          target="_blank"
        >
          <input
            type="text"
            name="q"
            autocomplete="off"
            placeholder="Look Something up..."
            required
          />
          <div class="searchBottom"></div>
        </form>
      </div>
      <div class="linksContainer">
        <ul>
          <li>Web Tools <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#d97757">
  <path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/>
</svg></li>
          <li>Server <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#d97757">
  <path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/>
</svg></li>
          <li>Domains <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#d97757">
  <path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/>
</svg></li>
        </ul>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
